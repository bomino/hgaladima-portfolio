# Build + link-check CI.
#
# Runs on every push and PR. Catches the two most common breakages:
# 1. Broken build (syntax error in templates, missing data file, etc.)
# 2. Dead internal links (after a page is renamed, anchors forgotten)
#
# Does NOT gate the Cloudflare Pages deploy — CF builds independently
# from the push. This CI is a shadow build that fails loudly if
# something regresses, so Dr. G doesn't ship broken pages unnoticed.

name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Verify expected files exist
        run: |
          set -e
          for f in _site/index.html _site/sitemap.xml _site/robots.txt _site/feed.xml _site/blog/index.html; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
            echo "OK: $f"
          done

      - name: Link check (internal URLs, fragments skipped)
        uses: lycheeverse/lychee-action@v2
        with:
          # lychee v0.23 renamed --base (now requires URL or absolute path)
          # to --root-dir for local root-relative link resolution. We point
          # it at the built _site/ directory so `<a href="/about/">` etc.
          # resolve to _site/about/.
          args: >-
            --offline
            --root-dir ${{ github.workspace }}/_site
            '_site/**/*.html'
          fail: true
        # Fragment-checking (--include-fragments) is deliberately omitted.
        # markdown-it-anchor's header-link permalinks URL-encode characters
        # like `&`, `—`, and `’` in hrefs (%26, %E2%80%94, %E2%80%99), which
        # browsers resolve correctly but lychee treats as "Cannot find
        # fragment". Real broken links in URL paths are still caught.
