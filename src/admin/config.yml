# Decap CMS configuration — hgaladima.com
#
# Backend: GitHub via a self-hosted OAuth relay on Cloudflare Pages
# Functions. Netlify's formerly-free public relay now requires the site
# to be hosted on Netlify, so we run our own two-function relay at
# /api/auth and /api/callback (see functions/api/*.js in this repo).
#
# See docs/decap-cms-setup.md for the one-time GitHub OAuth app
# registration and CF Pages env-var setup.

backend:
  name: github
  repo: bomino/hgaladima-portfolio
  branch: main
  base_url: https://hgaladima.com
  auth_endpoint: api/auth

site_url: https://hgaladima.com
display_url: https://hgaladima.com
logo_url: https://hgaladima.com/assets/photo.jpg

media_folder: src/assets/blog
public_folder: /assets/blog

collections:
  - name: blog
    label: Blog posts
    folder: src/blog
    create: true
    format: frontmatter
    slug: "{{year}}-{{month}}-{{slug}}"
    filter:
      field: layout
      value: post.njk
    fields:
      - { name: layout, label: Layout, widget: hidden, default: post.njk }
      - { name: title, label: Title, widget: string }
      - { name: date, label: Publish date, widget: datetime }
      - { name: summary, label: Summary (1-2 sentences, shows in blog index and search results), widget: text }
      - name: tags
        label: Tags
        widget: list
        default: ['teaching']
        summary: '{{fields.tag}}'
        field: { name: tag, label: Tag, widget: string }
      - { name: ogImage, label: Social preview image (optional, 1200×630 recommended), widget: image, required: false }
      - { name: permalink, label: URL slug (start and end with /), widget: string, required: false, hint: "Leave empty to auto-generate from title" }
      - { name: draft, label: Draft (uncheck to publish), widget: boolean, default: true }
      - { name: body, label: Post body, widget: markdown }

  # Publications — edits src/_data/publications.js as a JS array of objects.
  # Decap's "file" collection lets us treat a single data file as the thing
  # being edited. Dr. G adds a paper by appending an entry; the site auto-
  # generates a per-paper page on the next build via pagination.
  - name: publications
    label: Publications
    files:
      - name: pubs
        label: Publications list
        file: src/_data/publications.json
        fields:
          - name: publications
            label: Papers (newest first)
            widget: list
            summary: "{{fields.year}} — {{fields.title}}"
            fields:
              - { name: slug, label: URL slug (e.g. 2025-ml-breast-cancer), widget: string }
              - { name: title, label: Title, widget: string }
              - { name: authors, label: Authors (one per line, "Last, F." format), widget: list, field: { name: author, label: Author, widget: string } }
              - { name: year, label: Year, widget: number, value_type: int }
              - { name: month, label: Month (1–12, optional), widget: number, value_type: int, required: false }
              - { name: journal, label: Journal, widget: string }
              - { name: volume, label: Volume, widget: string, required: false }
              - { name: issue, label: Issue, widget: string, required: false }
              - { name: pages, label: Pages (e.g. 123–135), widget: string, required: false }
              - { name: doi, label: DOI, widget: string, required: false }
              - { name: url, label: Full URL to paper (usually the DOI), widget: string, required: false }
              - { name: tags, label: Tags (cancer, machine-learning, SDOH, methods, etc.), widget: list, field: { name: tag, label: Tag, widget: string } }
              - { name: summary, label: Plain-English summary (2-3 sentences), widget: text }
